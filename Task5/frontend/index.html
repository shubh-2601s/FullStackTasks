<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Make Payment</h1>
        <input type="number" id="amount" placeholder="Enter amount" step="0.01" min="0">
        <button onclick="makePayment()">Pay</button>
        <div id="message"></div>
    </div>
    <script>
        async function makePayment() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                document.getElementById('message').textContent = 'Please enter a valid amount';
                return;
            }
            try {
                const response = await fetch('http://localhost:8000/pay', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({amount: parseFloat(amount)})
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('message').textContent = data.message;
                    document.getElementById('message').style.color = 'green';
                } else {
                    document.getElementById('message').textContent = data.detail;
                    document.getElementById('message').style.color = 'red';
                }
            } catch (error) {
                document.getElementById('message').textContent = 'Error: ' + error.message;
                document.getElementById('message').style.color = 'red';
            }
        }
    </script>
</body>
</html>
