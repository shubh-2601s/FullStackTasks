---
# k8s-secret.yaml
# Kubernetes Secret for the JWT signing key.
#
# IMPORTANT: The value below is a base64-encoded placeholder.
# Before applying this manifest, replace the value with your own
# base64-encoded secret:
#
#   echo -n "your-very-secret-key" | base64
#
# Then apply: kubectl apply -f k8s-secret.yaml
#
# For production, manage secrets with AWS Secrets Manager + External Secrets Operator,
# HashiCorp Vault, or Sealed Secrets rather than committing this file to version control.

apiVersion: v1
kind: Secret
metadata:
  name: product-api-secrets
  labels:
    app: product-api
type: Opaque
data:
  # PLACEHOLDER – replace before applying.
  # Generate with: echo -n "your-actual-secret" | base64
  # Do NOT use the value below in production.
  jwt-secret-key: UkVQTEFDRV9NRV9XSVRIX1lPVVJfQUNUVUFMX1NFQ1JFVA==
